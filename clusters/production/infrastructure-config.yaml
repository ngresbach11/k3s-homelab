apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-config
  namespace: flux-system
spec: 
  dependsOn:
    - name: infrastructure-controllers
  interval: 1m0s
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/config/production
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
